name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push -f https://shadow99-web:$HF_TOKEN@huggingface.co/spaces/DiscordBOTNHIHUN/P2ARAFARMER main
